name: hooloi_clone
description: "Хүний хоолойг хуулбарлаж, асуултад дуугаар хариулдаг туслах."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Аудио бичих, тоглуулах
  record: ^5.1.2
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1

  # Сүлжээ (cloud API дуудлага)
  http: ^1.2.2
  path_provider: ^2.1.4

  # Тохиргоо хадгалах (API түлхүүр, voice_id)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
